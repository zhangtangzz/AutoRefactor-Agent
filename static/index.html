<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业智能问答 Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Microsoft YaHei", Roboto, sans-serif;
            background: #f5f7fa; color: #1a1a2e; min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px 24px; border-radius: 0 0 20px 20px;
            margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between;
        }
        header .header-left { text-align: left; }
        header h1 { font-size: 1.4rem; margin-bottom: 4px; }
        header p { opacity: 0.85; font-size: 0.85rem; }
        header .header-right { display: flex; align-items: center; gap: 12px; }
        .user-badge {
            background: rgba(255,255,255,0.15); padding: 6px 14px;
            border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
        }
        .user-badge .role-tag {
            background: rgba(255,255,255,0.25); padding: 1px 8px;
            border-radius: 10px; font-size: 0.72rem; font-weight: 600;
        }
        .btn-logout {
            background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 0.82rem;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(255,71,87,0.4); border-color: rgba(255,71,87,0.6); }

        .card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px;
        }
        .card h3 { margin-bottom: 12px; color: #4a4a6a; font-size: 1rem; display: flex; align-items: center; gap: 6px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input, textarea, select {
            flex: 1; padding: 10px 14px; border: 1px solid #e0e0e0;
            border-radius: 8px; font-size: 0.95rem; outline: none;
            transition: border-color 0.2s; font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { border-color: #667eea; }
        textarea { resize: vertical; min-height: 80px; }
        button {
            padding: 10px 24px; border: none; border-radius: 8px;
            font-size: 0.95rem; cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-danger:hover { background: #ee3a4a; }
        .btn-warn { background: #ffa502; color: white; }
        .btn-warn:hover { background: #e89400; }
        .btn-green { background: #10b981; color: white; }
        .btn-green:hover { background: #059669; }
        .btn-sm { padding: 5px 12px; font-size: 0.8rem; border-radius: 6px; }

        /* Chat */
        #chatArea { max-height: 500px; overflow-y: auto; padding: 10px; }
        .msg { margin-bottom: 14px; padding: 12px 16px; border-radius: 10px; line-height: 1.6; }
        .msg-user { background: #eef0ff; margin-left: 20px; }
        .msg-assistant { background: #f0fdf4; margin-right: 20px; }
        .msg .label { font-size: 0.75rem; font-weight: 700; margin-bottom: 4px; }
        .msg-user .label { color: #667eea; }
        .msg-assistant .label { color: #10b981; }
        .msg .sources { margin-top: 6px; font-size: 0.8rem; color: #888; }
        .msg .sources span { background: #f0f0f0; padding: 2px 8px; border-radius: 4px; margin-right: 4px; }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab {
            padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer;
            background: #e8e8e8; font-size: 0.9rem; transition: background 0.2s;
        }
        .tab.active { background: white; font-weight: 600; }
        .tab.admin-tab { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .empty-state { text-align: center; color: #bbb; padding: 40px 0; font-size: 0.95rem; }

        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { color: #888; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        tr:hover { background: #fafafa; }
        .role-badge {
            display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-size: 0.75rem; font-weight: 600;
        }
        .role-admin { background: #fef2f2; color: #dc2626; }
        .role-user  { background: #eff6ff; color: #2563eb; }
        .role-viewer{ background: #f5f5f5; color: #666; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .stat-card {
            background: linear-gradient(135deg, #f8f9ff, #fff);
            border-radius: 12px; padding: 20px; text-align: center;
            border: 1px solid #eee;
        }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: #667eea; }
        .stat-card .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }
        .stat-card.online .stat-value { color: #10b981; }
        .stat-card.offline .stat-value { color: #ff4757; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 99; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 28px; width: 400px;
            max-width: 92vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal h3 { margin-bottom: 16px; }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

        .toast {
            position: fixed; top: 20px; right: 20px; z-index: 999;
            padding: 10px 20px; border-radius: 10px; color: white; font-size: 0.85rem;
            font-weight: 500; animation: slideIn 0.3s ease; max-width: 360px;
        }
        @keyframes slideIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
        .toast-ok { background: #10b981; }
        .toast-err { background: #ff4757; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>企业智能问答 Agent</h1>
                <p>基于 RAG 架构 · 多轮对话 · 实时文档检索</p>
            </div>
            <div class="header-right">
                <div class="user-badge">
                    <span id="displayName">-</span>
                    <span class="role-tag" id="displayRole">-</span>
                </div>
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>
        </header>

        <div class="tabs" id="tabBar">
            <div class="tab active" data-tab="chat">💬 智能问答</div>
            <div class="tab" data-tab="upload">📄 文档管理</div>
            <div class="tab admin-tab" data-tab="users">👥 用户管理</div>
            <div class="tab admin-tab" data-tab="stats">📊 系统统计</div>
        </div>

        <!-- ==================== 智能问答 ==================== -->
        <div id="tab-chat" class="tab-content active">
            <div class="card">
                <h3>📝 会话ID: <span id="sessionId" style="font-weight:400;color:#888;">-</span></h3>
                <div id="chatArea">
                    <div class="empty-state">👋 欢迎使用企业智能问答助手，请输入您的问题</div>
                </div>
            </div>
            <div class="card">
                <div class="input-row">
                    <textarea id="question" placeholder="请输入您的问题... (Enter 发送，Shift+Enter 换行)"
                              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askQuestion();}"></textarea>
                </div>
                <div class="input-row">
                    <button class="btn-primary" onclick="askQuestion()">📨 发送问题</button>
                    <button class="btn-primary" onclick="askStream()">⚡ 流式问答 (SSE)</button>
                    <button class="btn-danger btn-sm" onclick="clearChat()">🗑 清除对话</button>
                </div>
            </div>
        </div>

        <!-- ==================== 文档管理 ==================== -->
        <div id="tab-upload" class="tab-content">
            <div class="card">
                <h3>📤 上传文档</h3>
                <div class="input-row">
                    <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.xlsx,.xls,.txt,.md,.csv">
                    <button class="btn-primary" onclick="uploadDocument()">上传并向量化</button>
                </div>
                <div id="uploadResult"></div>
            </div>
            <div class="card">
                <h3>📚 已索引文档 <span id="docCountBadge" style="font-weight:400;color:#888;font-size:0.85rem;"></span></h3>
                <button class="btn-sm btn-primary" onclick="listDocuments()">🔄 刷新列表</button>
                <div id="docList" style="margin-top:10px;"></div>
            </div>
        </div>

        <!-- ==================== 用户管理 ==================== -->
        <div id="tab-users" class="tab-content">
            <div class="card">
                <h3>➕ 创建用户</h3>
                <div class="input-row">
                    <input type="text" id="newUsername" placeholder="用户名">
                    <input type="password" id="newPassword" placeholder="密码">
                    <select id="newRole">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                        <option value="viewer">只读用户</option>
                    </select>
                    <button class="btn-green" onclick="createUser()">创建</button>
                </div>
                <div id="createUserResult"></div>
            </div>
            <div class="card">
                <h3>👥 用户列表</h3>
                <div id="userTable"></div>
            </div>
        </div>

        <!-- ==================== 系统统计 ==================== -->
        <div id="tab-stats" class="tab-content">
            <div class="stats-grid" id="statsGrid"></div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>⚠️ 确认删除</h3>
            <p id="deleteModalText"></p>
            <div class="btn-row">
                <button class="btn-sm" onclick="closeModal()">取消</button>
                <button class="btn-sm btn-danger" id="deleteConfirmBtn">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 重置密码弹窗 -->
    <div class="modal-overlay" id="pwdModal">
        <div class="modal">
            <h3>🔒 重置密码</h3>
            <p style="margin-bottom:12px;color:#888;font-size:0.9rem;" id="pwdModalUser"></p>
            <input type="text" id="resetPasswordInput" placeholder="新密码">
            <div class="btn-row">
                <button class="btn-sm" onclick="closePwdModal()">取消</button>
                <button class="btn-sm btn-warn" onclick="resetPassword()">确认重置</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 登录守卫 =====
        const token    = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const role     = localStorage.getItem('role');

        if (!token) { window.location.replace('/login.html'); throw new Error('未登录'); }

        document.getElementById('displayName').textContent = username || '-';
        document.getElementById('displayRole').textContent = role || '-';

        // 管理员显示管理标签
        if (role === 'admin') {
            document.querySelectorAll('.admin-tab').forEach(t => t.style.display = 'block');
        }

        function logout() {
            localStorage.clear();
            window.location.replace('/login.html');
        }

        // ===== Toast =====
        function toast(msg, ok = true) {
            const el = document.createElement('div');
            el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; }, 2500);
            setTimeout(() => el.remove(), 2900);
        }

        // ===== Tabs =====
        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => {
                const tab = t.dataset.tab;
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
                document.getElementById('tab-' + tab).classList.add('active');
                if (tab === 'upload') listDocuments();
                if (tab === 'users')  listUsers();
                if (tab === 'stats')  loadStats();
            });
        });

        // ===== API =====
        const API = '/api/v1';
        const authH = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token });

        // ===== 问答 =====
        let sessionId = '';

        async function askQuestion() {
            const q = document.getElementById('question').value.trim();
            if (!q) return;
            appendMsg('user', q);
            document.getElementById('question').value = '';
            const r = await fetch(API + '/ask', { method: 'POST', headers: authH(),
                body: JSON.stringify({ question: q, session_id: sessionId || null }) });
            const d = await r.json();
            if (d.session_id) sessionId = d.session_id;
            document.getElementById('sessionId').textContent = sessionId || '-';
            appendMsg('assistant', d.answer, d.sources);
        }

        async function askStream() {
            const q = document.getElementById('question').value.trim();
            if (!q) return;
            appendMsg('user', q);
            document.getElementById('question').value = '';
            const msgDiv = appendMsg('assistant', '', []);
            const r = await fetch(API + '/ask/stream', { method: 'POST', headers: authH(),
                body: JSON.stringify({ question: q, session_id: sessionId || null }) });
            const reader = r.body.getReader();
            const decoder = new TextDecoder();
            let answer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                for (const line of decoder.decode(value, { stream: true }).split('\n')) {
                    const data = line.replace('data: ', '').trim();
                    if (data && data !== '[DONE]') { answer += data; msgDiv.querySelector('.content').textContent = answer; }
                }
            }
        }

        function appendMsg(role, content, sources = []) {
            const area = document.getElementById('chatArea');
            const empty = area.querySelector('.empty-state');
            if (empty) empty.remove();
            const div = document.createElement('div');
            div.className = 'msg msg-' + role;
            div.innerHTML = '<div class="label">' + (role === 'user' ? '👤 你' : '🤖 AI助手') + '</div>'
                + '<div class="content">' + (content || '思考中...') + '</div>'
                + (sources && sources.length ? '<div class="sources">📎 来源: ' + sources.map(s => '<span>' + s + '</span>').join('') + '</div>' : '');
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
            return div;
        }

        async function clearChat() {
            if (sessionId) await fetch(API + '/conversation/' + sessionId, { method: 'DELETE', headers: authH() });
            sessionId = '';
            document.getElementById('sessionId').textContent = '-';
            document.getElementById('chatArea').innerHTML = '<div class="empty-state">👋 对话已清除，请输入新问题</div>';
        }

        // ===== 文档管理 =====
        async function uploadDocument() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const form = new FormData();
            form.append('file', file);
            const r = await fetch(API + '/documents/upload', {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: form });
            const d = await r.json();
            const el = document.getElementById('uploadResult');
            el.innerHTML = r.ok
                ? '<p style="color:#10b981;margin-top:10px;">✅ ' + d.message + '</p>'
                : '<p style="color:#ff4757;margin-top:10px;">❌ ' + (d.detail || '上传失败') + '</p>';
            document.getElementById('fileInput').value = '';
            listDocuments();
        }

        async function listDocuments() {
            const r = await fetch(API + '/documents', { headers: authH() });
            const d = await r.json();
            const el = document.getElementById('docList');
            const badge = document.getElementById('docCountBadge');
            badge.textContent = '(' + (d.total || 0) + ' 个文档)';
            if (!d.documents || !d.documents.length) {
                el.innerHTML = '<p style="color:#888;padding:10px 0;">暂无已索引文档</p>';
                return;
            }
            el.innerHTML = d.documents.map((doc, i) => {
                const fname = doc.source.split(/[/\\]/).pop();
                const delBtn = role === 'admin'
                    ? ' <button class="btn-sm btn-danger" style="padding:2px 8px;font-size:0.72rem;" onclick="event.stopPropagation();confirmDeleteDoc(\'' + escapeHtml(doc.source) + '\')">删除</button>'
                    : '';
                return '<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;">'
                    + '<span style="color:#888;font-size:0.8rem;">' + (i + 1) + '.</span>'
                    + '<span style="flex:1;word-break:break-all;" title="' + escapeHtml(doc.source) + '">📄 ' + escapeHtml(fname) + '</span>'
                    + delBtn + '</div>';
            }).join('');
        }

        async function deleteDocument(source) {
            const r = await fetch(API + '/documents/' + encodeURIComponent(source), {
                method: 'DELETE', headers: authH() });
            const d = await r.json();
            if (r.ok) { toast(d.message); listDocuments(); }
            else toast(d.detail || '删除失败', false);
        }

        // ===== 用户管理 =====
        async function listUsers() {
            const r = await fetch(API + '/admin/users', { headers: authH() });
            const d = await r.json();
            const el = document.getElementById('userTable');
            if (!d.users || !d.users.length) {
                el.innerHTML = '<p style="color:#888;">暂无用户</p>'; return;
            }
            const roleLabel = { admin: '管理员', user: '普通用户', viewer: '只读' };
            el.innerHTML = '<table><thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>创建时间</th><th>操作</th></tr></thead><tbody>'
                + d.users.map(u => '<tr>'
                    + '<td>' + u.id + '</td>'
                    + '<td><b>' + escapeHtml(u.username) + '</b></td>'
                    + '<td><span class="role-badge role-' + u.role + '">' + (roleLabel[u.role] || u.role) + '</span></td>'
                    + '<td style="color:#888;">' + u.created_at + '</td>'
                    + '<td>'
                    + (u.username !== username
                        ? '<button class="btn-sm btn-warn" onclick="changeRole(\'' + escapeHtml(u.username) + '\',\'' + u.role + '\')">改角色</button> '
                        + '<button class="btn-sm btn-primary" onclick="showPwdModal(\'' + escapeHtml(u.username) + '\')">改密</button> '
                        + '<button class="btn-sm btn-danger" onclick="confirmDeleteUser(\'' + escapeHtml(u.username) + '\')">删除</button>'
                        : '<span style="color:#888;font-size:0.8rem;">当前登录</span>')
                    + '</td></tr>').join('')
                + '</tbody></table>';
        }

        async function createUser() {
            const uname = document.getElementById('newUsername').value.trim();
            const pwd = document.getElementById('newPassword').value;
            const rl = document.getElementById('newRole').value;
            if (!uname || !pwd) { toast('用户名和密码不能为空', false); return; }
            const r = await fetch(API + '/admin/users', {
                method: 'POST', headers: authH(),
                body: JSON.stringify({ username: uname, password: pwd, role: rl }) });
            const d = await r.json();
            if (r.ok) { toast(d.message); document.getElementById('newUsername').value = ''; document.getElementById('newPassword').value = ''; listUsers(); }
            else toast(d.detail || '创建失败', false);
        }

        async function changeRole(uname, currentRole) {
            const roles = ['admin', 'user', 'viewer'];
            const idx = roles.indexOf(currentRole);
            const next = roles[(idx + 1) % 3];
            const r = await fetch(API + '/admin/users/' + encodeURIComponent(uname) + '/role', {
                method: 'PUT', headers: authH(), body: JSON.stringify({ role: next }) });
            const d = await r.json();
            if (r.ok) { toast(d.message); listUsers(); }
            else toast(d.detail || '修改失败', false);
        }

        function showPwdModal(uname) {
            document.getElementById('pwdModalUser').textContent = '用户: ' + uname;
            document.getElementById('resetPasswordInput').value = '';
            document.getElementById('pwdModal').classList.add('show');
            window._pwdTarget = uname;
        }
        function closePwdModal() { document.getElementById('pwdModal').classList.remove('show'); }

        async function resetPassword() {
            const uname = window._pwdTarget;
            const pwd = document.getElementById('resetPasswordInput').value;
            if (!pwd) { toast('密码不能为空', false); return; }
            const r = await fetch(API + '/admin/users/' + encodeURIComponent(uname) + '/password', {
                method: 'PUT', headers: authH(), body: JSON.stringify({ new_password: pwd }) });
            const d = await r.json();
            if (r.ok) { toast(d.message); closePwdModal(); listUsers(); }
            else toast(d.detail || '重置失败', false);
        }

        // ===== 删除确认（通用弹窗） =====
        function confirmDeleteDoc(source) {
            document.getElementById('deleteModalText').textContent = '确定要删除文档 "' + source.split(/[/\\]/).pop() + '" 吗？向量数据也将一并移除。';
            document.getElementById('deleteModal').classList.add('show');
            document.getElementById('deleteConfirmBtn').onclick = () => { closeModal(); deleteDocument(source); };
        }
        function confirmDeleteUser(uname) {
            document.getElementById('deleteModalText').textContent = '确定要删除用户 "' + uname + '" 吗？此操作不可恢复。';
            document.getElementById('deleteModal').classList.add('show');
            document.getElementById('deleteConfirmBtn').onclick = async () => {
                closeModal();
                const r = await fetch(API + '/admin/users/' + encodeURIComponent(uname), {
                    method: 'DELETE', headers: authH() });
                const d = await r.json();
                if (r.ok) { toast(d.message); listUsers(); }
                else toast(d.detail || '删除失败', false);
            };
        }
        function closeModal() { document.getElementById('deleteModal').classList.remove('show'); }

        // ===== 统计 =====
        async function loadStats() {
            const r = await fetch(API + '/admin/stats', { headers: authH() });
            const d = await r.json();
            const grid = document.getElementById('statsGrid');
            const items = [
                { label: '用户总数', value: d.user_count, icon: '👥' },
                { label: '已索引文档', value: d.document_count, icon: '📄' },
                { label: '向量块总数', value: d.vector_chunk_count, icon: '🧩' },
                { label: 'Redis 缓存', value: d.redis_connected ? '已连接' : '未连接', icon: d.redis_connected ? '🟢' : '🔴', cls: d.redis_connected ? 'online' : 'offline' },
            ];
            grid.innerHTML = items.map(s =>
                '<div class="stat-card ' + (s.cls || '') + '">'
                + '<div style="font-size:1.5rem;margin-bottom:4px;">' + s.icon + '</div>'
                + '<div class="stat-value">' + s.value + '</div>'
                + '<div class="stat-label">' + s.label + '</div></div>'
            ).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== Init =====
        listDocuments();
    </script>
</body>
</html>
