<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 企业智能问答 Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
        }

        /* 动态背景粒子 */
        .bg-particles {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .login-wrapper {
            position: relative; z-index: 1;
            width: 420px; max-width: 92vw;
        }

        /* Logo / 标题区 */
        .brand {
            text-align: center; margin-bottom: 28px;
            animation: fadeInDown 0.6s ease-out;
        }
        .brand .icon {
            width: 56px; height: 56px; margin: 0 auto 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px; display: flex;
            align-items: center; justify-content: center;
            font-size: 28px; box-shadow: 0 8px 32px rgba(102,126,234,0.35);
        }
        .brand h1 { font-size: 1.4rem; color: #fff; font-weight: 700; }
        .brand p  { font-size: 0.85rem; color: rgba(255,255,255,0.55); margin-top: 4px; }

        /* 卡片 */
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 36px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 输入组 */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group label {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: rgba(255,255,255,0.7); margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .input-group .input-wrap {
            position: relative; display: flex; align-items: center;
        }
        .input-group .input-icon {
            position: absolute; left: 14px; font-size: 1.1rem;
            opacity: 0.5; pointer-events: none; z-index: 2;
        }
        .input-group input {
            width: 100%; padding: 13px 14px 13px 44px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; color: #fff; font-size: 0.95rem;
            outline: none; transition: all 0.25s;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.3); }
        .input-group input:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .input-group input.error {
            border-color: #ff4757;
            box-shadow: 0 0 0 3px rgba(255,71,87,0.15);
        }

        /* 错误提示 */
        .error-msg {
            color: #ff6b7a; font-size: 0.78rem; margin-top: 4px;
            display: none; align-items: center; gap: 4px;
        }
        .error-msg.show { display: flex; }

        /* 全局错误 */
        .alert {
            padding: 12px 16px; border-radius: 10px; font-size: 0.85rem;
            margin-bottom: 18px; display: none; align-items: center; gap: 8px;
        }
        .alert.show { display: flex; }
        .alert-error {
            background: rgba(255,71,87,0.12);
            border: 1px solid rgba(255,71,87,0.25);
            color: #ff6b7a;
        }

        /* 登录按钮 */
        .btn-login {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-size: 1rem; font-weight: 700;
            cursor: pointer; margin-top: 8px;
            transition: all 0.3s; letter-spacing: 1px;
            position: relative; overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(102,126,234,0.4);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login.loading {
            pointer-events: none; opacity: 0.7;
        }
        .btn-login .spinner {
            display: none; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        .btn-login .btn-content {
            display: flex; align-items: center; justify-content: center;
        }
        .btn-login.loading .spinner { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 提示信息 */
        .hint {
            text-align: center; margin-top: 20px;
            font-size: 0.78rem; color: rgba(255,255,255,0.4);
        }
        .hint code {
            background: rgba(255,255,255,0.08); padding: 2px 8px;
            border-radius: 4px; font-family: "SF Mono", "Fira Code", monospace;
            font-size: 0.8rem; color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="particles"></div>

    <div class="login-wrapper">
        <div class="brand">
            <div class="icon">🧠</div>
            <h1>企业智能问答 Agent</h1>
            <p>基于 RAG 架构 · 内部知识库检索</p>
        </div>

        <div class="card">
            <div class="alert alert-error" id="alertBox">
                <span>⚠️</span><span id="alertText"></span>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <label>用户名</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username"
                               placeholder="请输入用户名"
                               autocomplete="username" required>
                    </div>
                    <div class="error-msg" id="usernameError">
                        <span>⚠</span><span>请输入用户名</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>密码</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password"
                               placeholder="请输入密码"
                               autocomplete="current-password" required>
                    </div>
                    <div class="error-msg" id="passwordError">
                        <span>⚠</span><span>请输入密码</span>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-content">
                        <span class="spinner"></span>登 录
                    </span>
                </button>
            </form>
        </div>

        <div class="hint">
            预置账号: <code>admin / admin123</code> &nbsp;|&nbsp; <code>user / user123</code>
        </div>
    </div>

    <script>
        // ===== 背景粒子 =====
        (function() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width  = size + 'px';
                p.style.height = size + 'px';
                p.style.left   = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 12 + 8) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(p);
            }
        })();

        // ===== 表单逻辑 =====
        const API_BASE = '/api/v1';
        const form    = document.getElementById('loginForm');
        const btn     = document.getElementById('loginBtn');
        const alertBox   = document.getElementById('alertBox');
        const alertText  = document.getElementById('alertText');
        const usernameEl = document.getElementById('username');
        const passwordEl = document.getElementById('password');

        function showFieldError(fieldId, show) {
            const el = document.getElementById(fieldId + 'Error');
            const input = document.getElementById(fieldId);
            el.classList.toggle('show', show);
            input.classList.toggle('error', show);
        }

        function showAlert(msg) {
            alertText.textContent = msg;
            alertBox.classList.add('show', 'alert-error');
        }
        function hideAlert() {
            alertBox.classList.remove('show', 'alert-error');
        }

        function setLoading(loading) {
            btn.classList.toggle('loading', loading);
            btn.querySelector('.btn-content').childNodes.forEach(n => {
                if (n.nodeType === 3) n.textContent = loading ? '登录中...' : '登 录';
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const username = usernameEl.value.trim();
            const password = passwordEl.value;

            // 校验
            let valid = true;
            if (!username) { showFieldError('username', true); valid = false; }
            else           { showFieldError('username', false); }
            if (!password) { showFieldError('password', true); valid = false; }
            else           { showFieldError('password', false); }
            if (!valid) return;

            setLoading(true);
            try {
                const resp = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await resp.json();
                if (!resp.ok) {
                    showAlert(data.detail || '登录失败，请检查用户名和密码');
                    return;
                }

                // 存储 token
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('username', username);
                localStorage.setItem('role', data.role || '');

                // 跳转主页
                window.location.href = '/';
            } catch (err) {
                showAlert('网络错误，请检查服务是否启动');
            } finally {
                setLoading(false);
            }
        });

        // 输入时清除错误状态
        usernameEl.addEventListener('input', () => {
            showFieldError('username', false);
            hideAlert();
        });
        passwordEl.addEventListener('input', () => {
            showFieldError('password', false);
            hideAlert();
        });
    </script>
</body>
</html>
